<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meez MCP Flow</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<!-- ==================================================================
     Meez MCP flow — animated vertical diagram
     Paste this whole block into a Webflow Embed element.
     Scales as a single unit (text, icons, spacing all shrink/grow
     together) to fit its container width, capped at its natural
     720px design size so it never blows up past its intended scale.
     No side padding — fits cleanly into a grid column and reflows
     when the grid stacks on tablet.
     ================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  .mcp-flow, .mcp-flow * { box-sizing: border-box; }
  .mcp-flow {
    width: 100%;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .mcp-flow a { color: #9184d9; }
  .mcp-flow a:hover { color: #b3a9e6; }
  .mcp-flow__outer {
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
  }
  .mcp-flow__canvas {
    width: 720px;
    flex-shrink: 0;
    transform-origin: top center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @keyframes mcpf-cardPulseV {
    0%, 100% { box-shadow: 0 0 0px 0px var(--glow, rgba(255,255,255,0)); }
    12% { box-shadow: 0 0 30px -2px var(--glow, rgba(255,255,255,0.25)); }
    30% { box-shadow: 0 0 0px 0px var(--glow, rgba(255,255,255,0)); }
  }
  @keyframes mcpf-particleDrop {
    0% { transform: translateY(-6px); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(40px); opacity: 0; }
  }
  @keyframes mcpf-dashMarch {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -32; }
  }
  @keyframes mcpf-iconGlowB {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(41,181,232,0.3)); }
    50% { filter: drop-shadow(0 0 12px rgba(41,181,232,0.8)); }
  }
  @keyframes mcpf-iconGlowP {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(139,92,246,0.3)); }
    50% { filter: drop-shadow(0 0 12px rgba(139,92,246,0.8)); }
  }
  @keyframes mcpf-toolPulse {
    0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 2px rgba(0,0,0,0)); }
    50% { transform: translateY(-3px); filter: drop-shadow(0 0 10px var(--tglow, rgba(76,200,140,0.5))); }
  }
</style>

<div class="mcp-flow">
  <div class="mcp-flow__outer">
    <div class="mcp-flow__canvas">
      <!-- Card 1: meez Recipe OS -->
      <div style="--glow:rgba(233,233,237,0.18);animation:mcpf-cardPulseV 7s ease-in-out 0s infinite;width:100%;max-width:560px;background:linear-gradient(180deg, rgba(30,36,58,0.55), rgba(10,14,26,0.9));border:1px solid rgba(120,130,160,0.35);border-radius:20px;padding:30px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;box-sizing:border-box">
        <div style="display:flex;align-items:center;gap:20px">
          <div style="display:flex;align-items:flex-start;gap:7px;height:64px">
            <span style="width:15px;height:64px;border-radius:8px;background:#3ba99c"></span>
            <span style="width:15px;height:45px;border-radius:8px;background:#4a5ab9"></span>
            <span style="width:15px;height:64px;border-radius:8px;background:#f5b81f"></span>
          </div>
          <div style="display:flex;align-items:baseline;gap:12px;line-height:1.1">
            <span style="color:#f5f6fa;font-size:40px;font-weight:700;letter-spacing:-0.02em">meez</span>
            <span style="color:#d8dbe6;font-size:26px;font-weight:500">Recipe OS</span>
          </div>
        </div>
        <div style="color:#f0f3f8;font-size:16px">The source of truth for your recipes</div>
      </div>

      <!-- Arrow 1 -->
      <div style="height:52px;width:24px;position:relative;display:flex;justify-content:center">
        <svg width="18" height="52" viewBox="0 0 18 52" fill="none" style="display:block"><path d="M9 2v40M2 36l7 8 7-8" stroke="#4db8e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <span style="position:absolute;top:2px;left:50%;margin-left:-3px;width:6px;height:6px;border-radius:50%;background:#4db8e8;box-shadow:0 0 8px 2px rgba(77,184,232,0.7);animation:mcpf-particleDrop 1.5s linear 0s infinite"></span>
        <span style="position:absolute;top:2px;left:50%;margin-left:-2.5px;width:5px;height:5px;border-radius:50%;background:#4db8e8;box-shadow:0 0 6px 2px rgba(77,184,232,0.6);animation:mcpf-particleDrop 1.5s linear 0.75s infinite"></span>
      </div>

<script>
(function () {
  function init(el) {
    var outer = el.querySelector('.mcp-flow__outer');
    var canvas = el.querySelector('.mcp-flow__canvas');
    if (!outer || !canvas) return;
    var naturalWidth = 720;
    function fit() {
      canvas.style.transform = 'none';
      var naturalHeight = canvas.offsetHeight;
      var w = outer.clientWidth;
      var scale = Math.min(1, w / naturalWidth);
      canvas.style.transform = 'scale(' + scale + ')';
      var outerHeight = Math.round(naturalHeight * scale);
      outer.style.height = outerHeight + 'px';
      // Report our real rendered height to a parent window, in case this
      // page is embedded via <iframe> — lets the host page size the
      // iframe exactly instead of guessing a fixed aspect ratio.
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ mcpFlowHeight: outerHeight }, '*');
      }
    }
    fit();
    if (window.ResizeObserver) {
      new ResizeObserver(fit).observe(outer);
    } else {
      window.addEventListener('resize', fit);
    }
  }
  document.querySelectorAll('.mcp-flow').forEach(init);
})();
</script>
